version: 1
backend:
  phases:
    build:
      commands:
        - npm install -g npm@10.9.2
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        - echo "VITE_SMS_MAX_BATCH_RECIPIENTS=${MAX_SMS_RECIPIENTS_PER_BATCH:-250}" > .env.production
        - echo "VITE_SMS_BATCH_COOLDOWN_SECONDS=${VITE_SMS_BATCH_COOLDOWN_SECONDS:-20}" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*